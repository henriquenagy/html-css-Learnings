<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form 03</title>
  </head>
  <body>
    <h1>Form 03 - datas horas ew tudo</h1>
    <form action="cadastro.php" method="get" autocomplete="on"></form>
    <p>
      <label for="inome"> Nome</label>
      <input
        type="text"
        name="nome"
        id="inome"
        required
        maxlength="30"
        placeholder="Nome Completo"
        autocomplete="name"
      />
    </p>
    <p>
      <label for="imedia"
        >Média<input
          type="number"
          name="media"
          id="imedia"
          min="0"
          max="10"
          placeholder="0 a 10"
          step="0.1"
          value="5"
          required
      /></label>
    </p>
    <p>
      <label for="imes"
        >Período Letivo<input type="month" name="mes" id="mes" value="2020-07"
      /></label>
    </p>
    <p>
      <label for="idia"
        >Dia da prova<input type="date" name="dia" id="idia" value="2023-03-28"
      /></label>
    </p>
    <p>
      <label for="time"
        >Horario da prova<input type="time" name="hora" id="ihora"
      /></label>
    </p>
    <p>
      <input type="submit" value="enviar" />
      <input type="reset" value="limpar" />
    </p>
  </body>
</html>
